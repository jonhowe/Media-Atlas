name: Publish Docker image to GHCR

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend migration smoke tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m unittest discover -s tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute build metadata
        id: build-meta
        shell: bash
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        shell: bash
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GIT_SHA: ${{ github.sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          OWNER="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_NAME="$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${PACKAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

          TAGS="${IMAGE}:sha-${GIT_SHA},${IMAGE}:${RELEASE_TAG},${IMAGE}:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: media-atlas:pre-publish
          build-args: |
            MEDIA_ATLAS_GIT_SHA=${{ github.sha }}
            MEDIA_ATLAS_BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
            MEDIA_ATLAS_IMAGE_TAG=${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image internals
        run: |
          docker run --rm media-atlas:pre-publish \
            bash -c "which ffmpeg && which ffprobe && which vainfo && test -f /usr/lib/x86_64-linux-gnu/dri/iHD_drv_video.so && test \"\$LIBVA_DRIVER_NAME\" = iHD && python -m compileall app && python -c 'from app.main import app; assert len(app.routes) > 0'"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: media-atlas:pre-publish
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          build-args: |
            MEDIA_ATLAS_GIT_SHA=${{ github.sha }}
            MEDIA_ATLAS_BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
            MEDIA_ATLAS_IMAGE_TAG=${{ github.event.release.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Add Docker image link to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          IMAGE: ${{ steps.vars.outputs.image }}
          REPO: ${{ github.repository }}
          PACKAGE_NAME: ${{ steps.vars.outputs.package_name }}
        run: |
          EXISTING=$(gh release view "$TAG" --json body -q .body)
          # Skip if Docker section is already present so re-runs are idempotent.
          if echo "$EXISTING" | grep -q "ghcr.io"; then
            echo "Docker link already present, skipping."
            exit 0
          fi
          printf '%s\n\n---\n\n**Docker Image**\n```\ndocker pull %s:%s\n```\n\n[View package on GHCR](https://github.com/%s/pkgs/container/%s)\n' \
            "$EXISTING" "$IMAGE" "$TAG" "$REPO" "$PACKAGE_NAME" \
            > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
