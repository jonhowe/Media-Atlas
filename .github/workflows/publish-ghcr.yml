name: Publish Docker image to GHCR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag for manual runs (e.g., latest, v0.1.0). If blank, defaults to 'latest'."
        required: false
        default: "latest"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend migration smoke tests
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m unittest discover -s tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: vars
        shell: bash
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          OWNER="$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_NAME="$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${PACKAGE_NAME}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

          # Always publish a sha tag for traceability.
          TAGS="${IMAGE}:sha-${GIT_SHA}"

          # If this is a release, publish the release tag and also update latest.
          if [ "${EVENT_NAME}" = "release" ]; then
            REL_TAG="${RELEASE_TAG}"
            TAGS="${TAGS},${IMAGE}:${REL_TAG},${IMAGE}:latest"
          elif [ "${EVENT_NAME}" = "push" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          else
            # Manual run: publish the provided tag (default 'latest').
            TAG="${INPUT_TAG}"
            if [ -z "${TAG}" ]; then
              TAG="latest"
            fi
            TAGS="${TAGS},${IMAGE}:${TAG}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: media-atlas:pre-publish
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: media-atlas:pre-publish
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: "1"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Add Docker image link to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          IMAGE: ${{ steps.vars.outputs.image }}
          REPO: ${{ github.repository }}
          PACKAGE_NAME: ${{ steps.vars.outputs.package_name }}
        run: |
          EXISTING=$(gh release view "$TAG" --json body -q .body)
          # Skip if Docker section is already present so re-runs are idempotent.
          if echo "$EXISTING" | grep -q "ghcr.io"; then
            echo "Docker link already present, skipping."
            exit 0
          fi
          printf '%s\n\n---\n\n**Docker Image**\n```\ndocker pull %s:%s\n```\n\n[View package on GHCR](https://github.com/%s/pkgs/container/%s)\n' \
            "$EXISTING" "$IMAGE" "$TAG" "$REPO" "$PACKAGE_NAME" \
            > /tmp/release-notes.md
          gh release edit "$TAG" --notes-file /tmp/release-notes.md
